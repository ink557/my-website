                    elements.loading.style.display = 'none';
                }
            }

            function solveWithBacktracking() {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const solutions = [];
                        const board = Array(8).fill().map(() => Array(7).fill(0));
                        
                        // 标记固定位置
                        for (let i = 0; i < 8; i++) {
                            for (let j = 0; j < 7; j++) {
                                if (gameState.fixedPositions.has(`${i},${j}`)) {
                                    board[i][j] = -1;
                                }
                            }
                        }
                        
                        // 复制拼图形状以便修改
                        const pieces = gameState.pieces.map(p => ({
                            ...p,
                            shape: p.shape.map(row => [...row])
                        }));
                        
                        // 尝试所有可能的拼图排列
                        backtrack(0, board, pieces, [], solutions);
                        
                        resolve(solutions.slice(0, 1)); // 只返回前1个解决方案
                    }, 0);
                });
            }

            function backtrack(pieceIndex, board, pieces, placedPieces, solutions) {
                if (pieceIndex === pieces.length) {
                    // 找到一个完整解决方案
                    solutions.push(board.map(row => [...row]));
                    return;
                }
                
                const piece = pieces[pieceIndex];
                const originalShape = piece.shape.map(row => [...row]);
                
                // 尝试所有可能的变换（旋转和翻转）
                for (let flip = 0; flip < 2; flip++) {
                    for (let rotation = 0; rotation < 4; rotation++) {
                        // 尝试将拼图放在棋盘上的每个可能位置
                        for (let i = 0; i < 8; i++) {
                            for (let j = 0; j < 7; j++) {
                                if (canPlacePiece(board, piece.shape, i, j)) {
                                    // 放置拼图
                                    placePieceOnBoard(board, pieceIndex + 1, piece.shape, i, j);
                                    placedPieces.push({index: pieceIndex, row: i, col: j});
                                    
                                    // 递归尝试放置下一个拼图
                                    backtrack(pieceIndex + 1, board, pieces, placedPieces, solutions);
                                    
                                    // 如果已经找到足够多的解决方案，提前返回
                                    if (solutions.length >= 1) return;
                                    
                                    // 回溯：移除拼图
                                    removePieceFromBoard(board, piece.shape, i, j);
                                    placedPieces.pop();
                                }
                            }
                        }
                        
                        // 旋转拼图
                        piece.shape = rotateMatrix(piece.shape);
                    }
                    
                    // 翻转拼图
                    piece.shape = flipMatrix(piece.shape);
                }
                
                // 恢复原始形状
                piece.shape = originalShape;
            }

            function canPlacePiece(board, shape, startRow, startCol) {
                const rows = shape.length;
                const cols = shape[0].length;
                
                // 检查是否超出边界
                if (startRow + rows > 8 || startCol + cols > 7) {
                    return false;
                }
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        if (shape[i][j] === 1) {
                            const cellRow = startRow + i;
                            const cellCol = startCol + j;
                            
                            // 检查是否是固定位置或已被占用
                            if (board[cellRow][cellCol] !== 0) {
                                return false;
                            }
                        }
                    }
                }
                
                return true;
            }

            function placePieceOnBoard(board, pieceId, shape, startRow, startCol) {
                const rows = shape.length;
                const cols = shape[0].length;
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        if (shape[i][j] === 1) {
                            board[startRow + i][startCol + j] = pieceId;
                        }
                    }
                }
            }

            function removePieceFromBoard(board, shape, startRow, startCol) {
                const rows = shape.length;
                const cols = shape[0].length;
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        if (shape[i][j] === 1) {
                            board[startRow + i][startCol + j] = 0;
                        }
                    }
                }
            }

            function displaySolutions() {
                elements.solutionsGrid.innerHTML = '';
                
                if (gameState.solutions.length === 0) {
                    elements.solutionModal.style.display = 'none';
                    updateStatus('未找到有效的解决方案', 'error');
                    return;
                }
                
                elements.solutionModal.style.display = 'flex';
                
                gameState.solutions.forEach((solution, index) => {
                    const solutionElement = document.createElement('div');
                    solutionElement.className = 'solution-item';
                    
                    const title = document.createElement('h4');
                    title.textContent = `解决方案 ${index + 1}`;
                    solutionElement.appendChild(title);
                    
                    const board = document.createElement('div');
                    board.className = 'solution-preview';
                    
                    for (let i = 0; i < 8; i++) {
                        for (let j = 0; j < 7; j++) {
                            const cell = document.createElement('div');
                            cell.className = 'solution-cell';
                            
                            if (solution[i][j] === -1) {
                                cell.classList.add('fixed');
                            } else if (solution[i][j] > 0) {
                                cell.classList.add('filled');
                                cell.style.backgroundColor = gameState.pieceColors[solution[i][j] - 1];
                            }
                            
                            board.appendChild(cell);
                        }
                    }
                    
                    solutionElement.appendChild(board);
                    
                    const applyBtn = document.createElement('button');
                    applyBtn.className = 'primary-btn';
                    applyBtn.textContent = '应用此方案';
                    applyBtn.style.marginTop = '10px';
                    applyBtn.addEventListener('click', () => applySolution(solution));
                    solutionElement.appendChild(applyBtn);
                    
                    elements.solutionsGrid.appendChild(solutionElement);
                });
            }

            function applySolution(solution) {
                resetBoard();
                
                // 记录每个拼图块的形状和位置
                const piecePositions = {};
                
                // 为每个拼图块创建变换记录
                for (let i = 0; i < gameState.pieces.length; i++) {
                    piecePositions[i] = {
                        shape: gameState.pieces[i].shape,
                        row: -1,
                        col: -1
                    };
                }
                
                // 找到每个拼图块的起始位置
                for (let pieceIndex = 0; pieceIndex < gameState.pieces.length; pieceIndex++) {
                    outerLoop:
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 7; c++) {
                            if (solution[r][c] === pieceIndex + 1) {
                                piecePositions[pieceIndex].row = r;
                                piecePositions[pieceIndex].col = c;
                                break outerLoop;
                            }
                        }
                    }
                }
                
                // 对每个拼图块应用正确的变换并放置
                for (let pieceIndex = 0; pieceIndex < gameState.pieces.length; pieceIndex++) {
                    const pos = piecePositions[pieceIndex];
                    if (pos.row === -1 || pos.col === -1) continue;
                    
                    // 计算解决方案中拼图块的实际形状
                    const solutionShape = [];
                    for (let i = 0; i < 8; i++) {
                        solutionShape[i] = [];
                        for (let j = 0; j < 7; j++) {
                            solutionShape[i][j] = solution[i][j] === pieceIndex + 1 ? 1 : 0;
                        }
                    }
                    
                    // 提取拼图块的实际形状
                    let minRow = 8, maxRow = -1, minCol = 7, maxCol = -1;
                    for (let i = 0; i < 8; i++) {
                        for (let j = 0; j < 7; j++) {
                            if (solutionShape[i][j] === 1) {
                                minRow = Math.min(minRow, i);
                                maxRow = Math.max(maxRow, i);
                                minCol = Math.min(minCol, j);
                                maxCol = Math.max(maxCol, j);
                            }
                        }
                    }
                    
                    const actualShape = [];
                    for (let i = minRow; i <= maxRow; i++) {
                        const row = [];
                        for (let j = minCol; j <= maxCol; j++) {
                            row.push(solutionShape[i][j]);
                        }
                        actualShape.push(row);
                    }
                    
                    // 初始化变换
                    gameState.pieceTransforms[pieceIndex] = {
                        shape: gameState.pieces[pieceIndex].shape,
                        rotation: 0,
                        flipped: false
                    };
                    
                    // 尝试所有变换组合以匹配实际形状
                    let foundMatch = false;
                    const originalShape = JSON.parse(JSON.stringify(gameState.pieces[pieceIndex].shape));
                    
                    for (let flip = 0; flip < 2; flip++) {
                        for (let rotation = 0; rotation < 4; rotation++) {
                            // 检查当前形状是否匹配
                            if (arraysEqual(gameState.pieceTransforms[pieceIndex].shape, actualShape)) {
                                foundMatch = true;
                                break;
                            }
                            
                            // 旋转形状
                            gameState.pieceTransforms[pieceIndex].shape = rotateMatrix(gameState.pieceTransforms[pieceIndex].shape);
                            gameState.pieceTransforms[pieceIndex].rotation = (rotation + 90) % 360;
                        }
                        
                        if (foundMatch) break;
                        
                        // 翻转形状
                        gameState.pieceTransforms[pieceIndex].shape = flipMatrix(gameState.pieceTransforms[pieceIndex].shape);
                        gameState.pieceTransforms[pieceIndex].flipped = !gameState.pieceTransforms[pieceIndex].flipped;
                    }
                    
                    // 如果没有找到匹配的变换，使用原始形状
                    if (!foundMatch) {
                        gameState.pieceTransforms[pieceIndex].shape = originalShape;
                        gameState.pieceTransforms[pieceIndex].rotation = 0;
                        gameState.pieceTransforms[pieceIndex].flipped = false;
                    }
                    
                    // 放置拼图块
                    placePieceAtPosition(pieceIndex, minRow, minCol);
                    
                    // 更新拼图块显示
                    const pieceElement = document.querySelector(`.puzzle-piece[data-piece-index="${pieceIndex}"]`);
                    if (pieceElement) {
                        pieceElement.classList.add('used');
                        pieceElement.style.opacity = '1';
                    }
                    
                    gameState.undoStack.push(pieceIndex);
                }
                
                elements.undoButton.disabled = false;
                
                gameState.moves = gameState.pieces.length;
                elements.movesDisplay.textContent = gameState.moves;
                
                if (!gameState.gameStarted) {
                    startGameTimer();
                }
                
                elements.solutionModal.style.display = 'none';
                updateStatus('已应用选定的解决方案', 'info');
            }

            // 辅助函数：检查两个二维数组是否相等
            function arraysEqual(a, b) {
                if (!a || !b) return false;
                if (a.length !== b.length) return false;
                
                for (let i = 0; i < a.length; i++) {
                    if (!Array.isArray(a[i]) || !Array.isArray(b[i]) || a[i].length !== b[i].length) {
                        return false;
                    }
                    for (let j = 0; j < a[i].length; j++) {
                        if (a[i][j] !== b[i][j]) {
                            return false;
                        }
                    }
                }
                return true;
            }

            function updateStatus(message, type = 'info') {
                elements.status.textContent = message;
                elements.status.className = 'status-message';
                
                switch (type) {
                    case 'success':
                        elements.status.classList.add('status-success');
                        break;
                    case 'error':
                        elements.status.classList.add('status-error');
                        break;
                    default:
                        elements.status.classList.add('status-info');
                }
            }

            // 绑定按钮事件
            elements.setDateBtn.addEventListener('click', setGameDate);
            elements.solvePuzzleBtn.addEventListener('click', solvePuzzle);
            elements.checkSolutionBtn.addEventListener('click', checkSolution);
            elements.resetBoardBtn.addEventListener('click', resetBoard);
            elements.undoButton.addEventListener('click', undoLastPiece);
            elements.closeModalBtn.addEventListener('click', () => {
                elements.solutionModal.style.display = 'none';
            });
            elements.playAgainBtn.addEventListener('click', () => {
                elements.congratsModal.style.display = 'none';
                resetBoard();
            });
            
            // 添加触摸反馈
            addTouchFeedback(elements.solvePuzzleBtn);
            addTouchFeedback(elements.checkSolutionBtn);
            addTouchFeedback(elements.resetBoardBtn);
            addTouchFeedback(elements.undoButton);
            addTouchFeedback(elements.closeModalBtn);
            addTouchFeedback(elements.playAgainBtn);
            addTouchFeedback(versionSwitchBtn);
            
            elements.monthSelect.addEventListener('change', function() {
                const year = parseInt(elements.yearSelect.value);
                const month = parseInt(this.value);
                updateDaySelector(year, month);
            });
            
            elements.yearSelect.addEventListener('change', function() {
                const year = parseInt(this.value);
                const month = parseInt(elements.monthSelect.value);
                updateDaySelector(year, month);
            });

            window.addEventListener('click', (e) => {
                if (e.target === elements.solutionModal) {
                    elements.solutionModal.style.display = 'none';
                }
                if (e.target === elements.congratsModal) {
                    elements.congratsModal.style.display = 'none';
                }
            });

            // 监听窗口大小变化，自动调整布局
            window.addEventListener('resize', () => {
                const wasMobileView = isMobileView;
                isMobileView = window.innerWidth <= 768;
                
                if (wasMobileView !== isMobileView) {
                    updateVersionButtonText();
                    updateTransformButtonsVisibility();
                    initializeBoard();
                }
            });

            initDateSelectors();
            setGameDate();
            updateTransformButtonsVisibility();
            updateStatus(isMobileView ? '手机视图：点击拼图块选中，使用按钮操作' : '电脑视图：可拖拽拼图，使用键盘操作', 'info');
        });
    </script>
</body>
</html>
